<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="theme-color" content="#0f1219" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finance Pro" />
    
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-512.png" />
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Finance Pro" />
    <meta name="msapplication-TileColor" content="#0f1219" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    
    <meta name="description" content="Personal Finance Tracker for UAE & India Expats" />
    <meta name="keywords" content="finance, expense tracker, UAE, India, expat, budget" />
    <meta name="author" content="My Finance Pro" />
    
    <meta property="og:title" content="My Finance Pro" />
    <meta property="og:description" content="Personal Finance Tracker for Expats" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://my-finance-pro-phi.vercel.app" />
    <meta property="og:image" content="/icon-512.png" />
    
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-192.png" />
    <link rel="shortcut icon" href="/icon-192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    
    <title>My Finance Pro</title>
    
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        background-color: #0f1219;
        min-height: 100%;
        min-height: 100dvh;
        overflow-x: hidden;
      }
      
      body {
        /* iOS safe area */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Initial loader */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #0f1219;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 16px;
      }
      
      #initial-loader .logo {
        width: 88px;
        height: 88px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 44px;
        animation: logoPulse 1.5s ease-in-out infinite;
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
      }
      
      #initial-loader .app-name {
        color: #f1f5f9;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.3px;
        margin: 0;
      }
      
      #initial-loader .app-sub {
        color: rgba(148, 163, 184, 0.8);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.5px;
        margin: -8px 0 0;
      }
      
      #initial-loader .spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-top: 8px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes logoPulse {
        0%, 100% { 
          transform: scale(1); 
          box-shadow: 0 8px 32px rgba(99,102,241,0.4); 
        }
        50% { 
          transform: scale(1.06); 
          box-shadow: 0 12px 40px rgba(99,102,241,0.6); 
        }
      }

      /* Hide scrollbars — native app feel */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
      
      .no-select {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  
  <body class="no-select">
    
    <div id="initial-loader">
      <div class="logo">💰</div>
      <p class="app-name">My Finance Pro</p>
      <p class="app-sub">UAE & India Expat Finance</p>
      <div class="spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // IndexedDB warm-up — prevents Firebase Auth logout on iOS
      (function() {
        try {
          const req = indexedDB.open('firebase-auth-warmup', 1);
          req.onsuccess = function() { req.result.close(); };
        } catch(e) {}
      })();
      
      // PWA mode detection
      window.isPWA = window.matchMedia('(display-mode: standalone)').matches 
        || window.navigator.standalone === true;
      window.isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      window.isAndroid = /Android/.test(navigator.userAgent);
      
      console.log('[App] PWA:', window.isPWA, '| iOS:', window.isIOS, '| Android:', window.isAndroid);
      
      // Android: Listen for beforeinstallprompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window._installPrompt = e;
        console.log('[App] Install prompt ready');
      });
    </script>
  </body>
</html>
